name: VenueScope CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  python-check:
    name: Python syntax & import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            pyflakes \
            sqlalchemy \
            pyyaml \
            numpy \
            boto3

      - name: Syntax check (pyflakes)
        run: |
          python -m pyflakes venuescope/core/ venuescope/app/ || true

      - name: Import check — core modules
        run: |
          cd venuescope
          python -c "from core.database import list_jobs, get_job; print('database OK')"
          python -c "from core.config import MODEL_PROFILES; print('config OK')"
          python -c "from core.alerts import send_theft_alert; print('alerts OK')"
          python -c "from core.camera_health import get_all_status; print('camera_health OK')"
          python -c "from core.logging_config import setup_logging; print('logging_config OK')"
          python -c "from core.backup import backup_to_s3; print('backup OK')"
          python -c "from core.aws_sync import sync_job_to_aws; print('aws_sync OK')"

  typescript-check:
    name: TypeScript build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: venuescope:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    name: Push to ECR (main branch only)
    runs-on: ubuntu-latest
    needs: [python-check, typescript-check, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/venuescope:latest
            ${{ steps.login-ecr.outputs.registry }}/venuescope:${{ github.sha }}
