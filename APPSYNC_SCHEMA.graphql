type SensorData {
  venueId: ID!
  timestamp: String!
  decibels: Float
  light: Float
  indoorTemp: Float
  outdoorTemp: Float
  humidity: Float
  currentSong: String
  albumArt: String
  artist: String
  occupancy: OccupancyData
}

type OccupancyData {
  current: Int
  entries: Int
  exits: Int
  capacity: Int
}

type SensorDataConnection {
  items: [SensorData]
  nextToken: String
}

type Location {
  locationId: ID!
  venueId: ID!
  displayName: String
  locationName: String
  address: String
  timezone: String
  deviceId: String
  mqttTopic: String
}

type LocationConnection {
  items: [Location]
  nextToken: String
}

type OccupancyMetrics {
  venueId: ID!
  current: Int
  todayEntries: Int
  todayExits: Int
  peakOccupancy: Int
  peakTime: String
  sevenDayAvg: Float
  fourteenDayAvg: Float
  thirtyDayAvg: Float
}

type VenueConfig {
  venueId: ID!
  locationId: ID!
  displayName: String
  locationName: String
  mqttTopic: String
  iotEndpoint: String
}

# VenueScope CCTV analytics jobs — written by local Mac processor, read by dashboard
type VenueScopeJob {
  venueId: ID!
  jobId: String!
  clipLabel: String
  analysisMode: String
  # All modes run in this job (JSON array string: ["drink_count","people_count"])
  activeModes: String
  totalDrinks: Int
  drinksPerHour: Float
  topBartender: String
  confidenceScore: Int
  confidenceLabel: String
  confidenceColor: String
  hasTheftFlag: Boolean
  unrungDrinks: Int
  cameraLabel: String
  createdAt: Float
  finishedAt: Float
  status: String
  s3ClipKey: String
  # Full summary JSON stored in S3 — fetch via Lambda presigned URL for rich detail view
  summaryS3Key: String
  # In-progress tracking (updated every ~60s during processing)
  progressPct: Int
  statusMsg: String
  updatedAt: Float
  # Camera auto-detection result
  cameraAngle: String
  # Review queue: count of low-confidence events pending human review
  reviewCount: Int
  # ── Bottle count metrics ───────────────────────────────────────────────────
  bottleCount: Int
  peakBottleCount: Int
  pourCount: Int
  totalPouredOz: Float
  overPours: Int
  walkOutAlerts: Int
  unknownBottleAlerts: Int
  parLowEvents: Int
  # ── People count metrics ───────────────────────────────────────────────────
  totalEntries: Int
  totalExits: Int
  peakOccupancy: Int
  # ── Table turns metrics ────────────────────────────────────────────────────
  totalTurns: Int
  avgResponseSec: Float
  avgDwellMin: Float
  # ── Staff activity metrics ─────────────────────────────────────────────────
  uniqueStaff: Int
  peakHeadcount: Int
  avgIdlePct: Float
  # ── Live camera stream fields (updated every ~30s from continuous RTSP) ────
  isLive: Boolean
  roomLabel: String
  bartenderBreakdown: String
  elapsedSec: Float
}

type VenueScopeJobConnection {
  items: [VenueScopeJob]
  nextToken: String
}

type Query {
  getSensorData(venueId: ID!, timestamp: String!): SensorData
    @aws_cognito_user_pools

  listSensorData(
    venueId: ID!
    startTime: String!
    endTime: String!
    limit: Int
    nextToken: String
  ): SensorDataConnection
    @aws_cognito_user_pools

  listVenueLocations(
    venueId: ID!
    limit: Int
    nextToken: String
  ): LocationConnection
    @aws_cognito_user_pools

  getOccupancyMetrics(venueId: ID!): OccupancyMetrics
    @aws_cognito_user_pools

  getVenueConfig(venueId: ID!, locationId: String!): VenueConfig
    @aws_cognito_user_pools

  getUserSettings(userId: ID!): UserSettings
    @aws_cognito_user_pools

  getVenueSettings(venueId: ID!): VenueSettingsData
    @aws_cognito_user_pools

  listVenueScopeJobs(
    venueId: ID!
    limit: Int
    nextToken: String
  ): VenueScopeJobConnection
    @aws_cognito_user_pools
}

# User Settings for cross-device sync
type UserSettings {
  userId: ID!
  theme: String
  soundAlerts: Boolean
  refreshInterval: Int
  temperatureUnit: String
  timezone: String
  notifications: Boolean
  emailNotifications: EmailNotificationSettings
  termsAccepted: Boolean
  termsAcceptedDate: String
}

type EmailNotificationSettings {
  dailySummary: Boolean
  highOccupancyAlerts: Boolean
  temperatureAlerts: Boolean
  weeklyReports: Boolean
  monthlyInsights: Boolean
  sensorOfflineAlerts: Boolean
}

input EmailNotificationSettingsInput {
  dailySummary: Boolean
  highOccupancyAlerts: Boolean
  temperatureAlerts: Boolean
  weeklyReports: Boolean
  monthlyInsights: Boolean
  sensorOfflineAlerts: Boolean
}

input UserSettingsInput {
  userId: ID!
  theme: String
  soundAlerts: Boolean
  refreshInterval: Int
  temperatureUnit: String
  timezone: String
  notifications: Boolean
  emailNotifications: EmailNotificationSettingsInput
  termsAccepted: Boolean
  termsAcceptedDate: String
}

# Venue Settings for cross-device sync
type VenueSettingsData {
  venueId: ID!
  address: VenueAddress
  toastPOS: ToastPOSConfig
  lastUpdated: String
}

type VenueAddress {
  street: String
  city: String
  state: String
  zipCode: String
  country: String
}

type ToastPOSConfig {
  enabled: Boolean
  apiKey: String
  restaurantGuid: String
}

input VenueAddressInput {
  street: String
  city: String
  state: String
  zipCode: String
  country: String
}

input ToastPOSConfigInput {
  enabled: Boolean
  apiKey: String
  restaurantGuid: String
}

input VenueSettingsInput {
  venueId: ID!
  address: VenueAddressInput
  toastPOS: ToastPOSConfigInput
}

type Mutation {
  saveUserSettings(input: UserSettingsInput!): UserSettings
    @aws_cognito_user_pools

  saveVenueSettings(input: VenueSettingsInput!): VenueSettingsData
    @aws_cognito_user_pools
}

type Schema {
  query: Query
  mutation: Mutation
}
